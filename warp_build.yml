name: warp_build
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - libtiff
  - pytorch-gpu=2.5.1       # conda-forge GPU build string (not gpu_cuda124); see note
  - fftw=*=*openmp*
  - cmake<4
  - cxx-compiler=1.3
  - cuda-nvtx-dev
  - cuda-version=12.4
  - cuda-toolkit=12.4            # replaces nvcc + cudart-dev + libcufft/cublas/curand-dev + nvrtc-dev
  - cuda-cccl                    # Thrust/CUB headers torch's CUDA build pulls in
  - cuda-cudart-static           # kept explicit; the metapackage may omit the static lib
  - dotnet=10.0                # NOT CentOS 7 compatible (needs glibc 2.28 / RHEL 8+) — see note
