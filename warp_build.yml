name: warp_build
channels:
  - pkgs/main  
  - nvidia/label/cuda-12.4.0
  - conda-forge
  - nodefaults
dependencies:
  - libtiff
  - python=3.12
  - pytorch=2.5.1=gpu_cuda124*
  - conda-forge::fftw=*=*openmp*
  - cmake<4
  - cxx-compiler=1.3
  - dotnet=10.0
  - cuda-version=12.4
  - cuda-nvcc=12.4
  - cuda-cudart-dev
  - cuda-cudart-static
  - libcufft-dev
  - libcublas-dev
  - libcurand-dev
  - cuda-nvrtc-dev
